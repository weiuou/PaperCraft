services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: papercraft-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    environment: &api-environment
      DATABASE_URL: postgresql+psycopg://papercraft:papercraft_dev@postgres:5432/papercraft
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_UPLOADS: papercraft-local-uploads
      S3_BUCKET_ARTIFACTS: papercraft-local-artifacts
      S3_FORCE_PATH_STYLE: "true"
      MAX_UPLOAD_MB: "20"
      MAX_UPLOAD_IMAGES: "3"
      TASK_TIMEOUT_SECONDS: "1800"
      JWT_SECRET: change-me-before-production
      JWT_ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    container_name: papercraft-api
    environment:
      <<: *api-environment
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    container_name: papercraft-worker
    environment:
      <<: *api-environment
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.worker.celery_app:celery_app", "worker", "--loglevel=INFO"]

  postgres:
    image: postgres:16-alpine
    container_name: papercraft-postgres
    environment:
      POSTGRES_DB: papercraft
      POSTGRES_USER: papercraft
      POSTGRES_PASSWORD: papercraft_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papercraft -d papercraft"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: papercraft-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: papercraft-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/papercraft-local-uploads &&
      mc mb --ignore-existing local/papercraft-local-artifacts
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
